name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check (types, coverage, längd, död kod)
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify ingest → API (fixture)
        run: |
          BIBLE_SOURCE=fixture DATABASE_URL=./data/ci.db npm run ingest -- bibel-1917
